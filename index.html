<!DOCTYPE html>
<html>
<head>
  <title>NovaX Pairing</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 100px;
    }
    input {
      padding: 12px;
      width: 250px;
      border-radius: 8px;
      border: none;
      margin-bottom: 10px;
    }
    button {
      padding: 12px 20px;
      background: #facc15;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
    #result {
      margin-top: 20px;
      font-size: 20px;
      color: #22c55e;
    }
  </style>
</head>
<body>

  <h2>🔑 NovaX Pairing Code</h2>

  <input id="number" placeholder="2547XXXXXXXX"><br>
  <button onclick="pair()">Get Code</button>

  <div id="result"></div>

  <script>
    async function pair() {
      const number = document.getElementById("number").value

      const res = await fetch("/pair", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ number })
      })

      const data = await res.json()

      document.getElementById("result").innerText =
        data.code || data.error
    }
  </script>

</body>
</html>
